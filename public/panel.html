<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detached Panel - Draft Diff Editor</title>
    <link rel="stylesheet" href="/styles.css?v=project-notes-history-2026-05-24">
  </head>
  <body class="detached-panel-body">
    <main class="detached-panel-shell">
      <header class="detached-panel-header">
        <span id="panel-kicker" class="panel-kicker">Detached panel</span>
        <p id="panel-status" class="titlebar-status">
          <span class="status-dot" aria-hidden="true"></span>
          <span class="status-text">Loading...</span>
        </p>
      </header>

      <section id="panel-pages" class="detached-pages" aria-label="Detached writing panels"></section>
    </main>

    <script src="/panel.js?v=project-notes-history-2026-05-24"></script>
  </body>
</html>
