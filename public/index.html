<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Draft Diff Editor</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="titlebar">
        <div>
          <h1>
            <span>Draft Diff Editor</span>
            <strong id="project-title">draft-history.txt</strong>
          </h1>
          <p id="save-status">Loading...</p>
        </div>
      </header>

      <nav class="ribbon" aria-label="Editor ribbon">
        <div class="ribbon-menus">
          <details id="file-menu" class="file-menu">
            <summary>File</summary>
            <div class="file-menu-panel">
              <button id="file-new" type="button">New</button>
              <button id="file-open" type="button">Open...</button>
              <button id="file-save-as" type="button">Save as...</button>
            </div>
          </details>
          <details id="view-menu" class="file-menu">
            <summary>View</summary>
            <div class="file-menu-panel">
              <div id="pages-on-screen" class="view-options" aria-label="Pages on screen">
                <button type="button" data-pages-on-screen="1">1 on screen</button>
                <button type="button" data-pages-on-screen="2" aria-pressed="true">2 on screen</button>
                <button type="button" data-pages-on-screen="3">3 on screen</button>
                <button type="button" data-pages-on-screen="4">4 on screen</button>
              </div>
            </div>
          </details>
        </div>
        <input id="file-open-input" type="file" accept=".txt,text/plain" hidden>

        <div class="tab-strip" aria-label="Pages">
          <div id="story-tab" class="page-tab story-tab">
            <input id="story-display-toggle" type="checkbox" data-display-story aria-label="Display Story Notes">
            <button class="tab-label" type="button" data-story-focus>
              <span>Story Notes</span>
            </button>
          </div>
          <div id="draft-tabs" class="draft-tabs"></div>
          <button id="new-draft-blank" class="add-tab" type="button" title="Add draft" aria-label="Add draft">+</button>
        </div>

        <div class="ribbon-actions">
          <button id="new-draft-copy" type="button">Copy draft</button>
          <button id="toggle-changes" type="button" aria-pressed="false">Show changes</button>
          <label class="select-control" for="compare-mode">
            Compare
            <select id="compare-mode">
              <option value="first">To first</option>
              <option value="consecutive">Consecutive</option>
            </select>
          </label>
          <a class="link-button" href="/api/export" target="_blank" rel="noreferrer">Text file</a>
        </div>
      </nav>

      <section id="editor-surface" class="editor-surface">
        <section id="page-canvas" class="page-canvas" aria-label="Writing pages"></section>

        <aside id="changes-panel" class="changes-panel" aria-label="Draft comparison" hidden>
          <div class="changes-heading">
            <div>
              <h2>Draft comparison</h2>
              <span id="compare-subtitle"></span>
            </div>
          </div>
          <div class="legend" aria-label="Diff legend">
            <span><i class="legend-added"></i>Added</span>
            <span><i class="legend-removed"></i>Deleted</span>
            <span><i class="legend-same"></i>Unchanged</span>
          </div>
          <div id="compare-selector" class="compare-selector" aria-label="Drafts to compare"></div>
          <div id="diff-output" class="diff-output"></div>
        </aside>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
