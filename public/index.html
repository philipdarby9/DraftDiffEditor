<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Draft Diff Editor</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="titlebar">
        <span class="titlebar-app">Draft Diff Editor</span>
        <span class="titlebar-separator" aria-hidden="true">·</span>
        <strong id="project-title" class="titlebar-file">draft-history.txt</strong>
        <p id="save-status" class="titlebar-status">
          <span class="status-dot" aria-hidden="true"></span>
          <span class="status-text">Loading...</span>
        </p>
      </header>

      <nav class="ribbon" aria-label="Editor ribbon">
        <div class="ribbon-menus">
          <details id="file-menu" class="file-menu">
            <summary>File</summary>
            <div class="file-menu-panel">
              <button id="file-new" type="button"><span class="menu-check">✓</span><span>New</span><span class="menu-shortcut" data-shortcut="new">Ctrl+N</span></button>
              <button id="file-open" type="button"><span class="menu-check">✓</span><span>Open…</span><span class="menu-shortcut" data-shortcut="open">Ctrl+O</span></button>
              <span class="menu-divider" aria-hidden="true"></span>
              <button id="file-save-as" type="button"><span class="menu-check">✓</span><span>Save as…</span><span class="menu-shortcut" data-shortcut="saveAs">Ctrl+Shift+S</span></button>
            </div>
          </details>
          <details id="edit-menu" class="file-menu">
            <summary>Edit</summary>
            <div class="file-menu-panel">
              <button id="edit-undo" type="button" disabled><span class="menu-check" aria-hidden="true"></span><span>Undo</span><span class="menu-shortcut" data-shortcut="undo">Ctrl+Z</span></button>
              <button id="edit-redo" type="button" disabled><span class="menu-check" aria-hidden="true"></span><span>Redo</span><span class="menu-shortcut" data-shortcut="redo">Ctrl+Y</span></button>
            </div>
          </details>
          <details id="view-menu" class="file-menu">
            <summary>View</summary>
            <div class="file-menu-panel">
              <div id="pages-on-screen" class="view-options" aria-label="Pages on screen">
                <button type="button" data-pages-on-screen="1"><span class="menu-check">✓</span><span>1 on screen</span><span class="menu-shortcut" data-shortcut="pages1">Ctrl+1</span></button>
                <button type="button" data-pages-on-screen="2" aria-pressed="true"><span class="menu-check">✓</span><span>2 on screen</span><span class="menu-shortcut" data-shortcut="pages2">Ctrl+2</span></button>
                <button type="button" data-pages-on-screen="3"><span class="menu-check">✓</span><span>3 on screen</span><span class="menu-shortcut" data-shortcut="pages3">Ctrl+3</span></button>
                <button type="button" data-pages-on-screen="4"><span class="menu-check">✓</span><span>4 on screen</span><span class="menu-shortcut" data-shortcut="pages4">Ctrl+4</span></button>
              </div>
            </div>
          </details>
        </div>
        <input id="file-open-input" type="file" accept=".txt,text/plain" hidden>

        <div class="tab-strip" aria-label="Pages">
          <div id="story-tab" class="page-tab story-tab">
            <input id="story-display-toggle" type="checkbox" data-display-story aria-label="Display Project notes">
            <button class="tab-label" type="button" data-story-focus aria-label="Project notes">
              <span class="tab-label-full">Project notes</span>
              <span class="tab-label-short" aria-hidden="true">PN</span>
            </button>
          </div>
          <div id="draft-tabs" class="draft-tabs"></div>
          <button id="new-draft-blank" class="add-tab" type="button" title="Add draft" aria-label="Add draft">+</button>
        </div>

        <div class="ribbon-actions">
          <button id="new-draft-copy" type="button" title="Duplicate the focused draft as a new draft">
            <svg class="action-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="3" width="9" height="9" rx="1.5"></rect>
              <path d="M5.5 5.5h-1A1.5 1.5 0 0 0 3 7v6.5A1.5 1.5 0 0 0 4.5 15H11a1.5 1.5 0 0 0 1.5-1.5v-1"></path>
            </svg>
            <span>Copy draft</span>
          </button>
          <button id="toggle-changes" type="button" aria-pressed="false">
            <svg class="action-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 4h10M3 8h6M3 12h10"></path>
              <path d="M11.5 7L14 8.5l-2.5 1.5"></path>
            </svg>
            <span class="toggle-changes-label">Show changes</span>
          </button>
          <span class="action-divider" aria-hidden="true"></span>
          <a class="link-button" href="/api/export" target="_blank" rel="noreferrer" title="Open the companion text file in a new tab">
            <svg class="action-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 2H4.5A1.5 1.5 0 0 0 3 3.5v9A1.5 1.5 0 0 0 4.5 14h7a1.5 1.5 0 0 0 1.5-1.5V6"></path>
              <path d="M9 2v3.5A.5.5 0 0 0 9.5 6H13"></path>
              <path d="M9 2l4 4"></path>
            </svg>
            <span>Text file</span>
          </a>
        </div>
      </nav>

      <section id="editor-surface" class="editor-surface">
        <section id="page-canvas" class="page-canvas" aria-label="Writing pages"></section>

        <aside id="changes-panel" class="changes-panel" aria-label="Draft comparison" hidden>
          <div class="compare-bar">
            <h2>
              <span class="compare-kicker">DRAFT&nbsp;COMPARISON</span>
              <span id="compare-subtitle">To first draft</span>
            </h2>
            <div class="legend" aria-label="Diff legend">
              <span class="legend-item"><span class="legend-swatch add">added</span></span>
              <span class="legend-item"><span class="legend-swatch del">deleted</span></span>
              <span class="legend-item"><span class="legend-swatch same">unchanged</span></span>
              <span class="legend-item"><span class="legend-swatch ws">·whitespace·</span></span>
            </div>
            <label class="select-control compare-mode-control" for="compare-mode">
              Compare
              <select id="compare-mode">
                <option value="first">To first</option>
                <option value="consecutive">Consecutive</option>
              </select>
            </label>
          </div>
          <div id="diff-output" class="diff-output"></div>
        </aside>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
